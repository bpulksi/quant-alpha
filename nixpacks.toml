[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "npm ci",
  "pip install --no-cache-dir requests python-dotenv pandas numpy scikit-learn ta vaderSentiment feedparser nltk praw",
  "python -c \"import nltk; nltk.download('vader_lexicon', quiet=True)\""
]

[start]
cmd = "node server.js"
